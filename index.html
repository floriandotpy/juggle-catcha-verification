<title>CATCHA – Verifizierung</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤹</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Verdana, Geneva, Tahoma, sans-serif;
    font-size: 13px;
    background: #e8e8e8;
    color: #333;
    display: flex;
    justify-content: center;
    padding: 30px 10px;
    min-height: 100vh;
  }

  .forum-page { max-width: 760px; width: 100%; }

  /* --- Forum header bar --- */
  .forum-header {
    background: #0066a2;
    color: #fff;
    padding: 8px 16px;
    font-size: 10px;
    border-radius: 6px 6px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .forum-header .breadcrumb { opacity: 0.6; }
  .forum-header .user { font-weight: bold; opacity: 0.7; }

  /* --- Main panel --- */
  .forum-panel {
    background: #fff;
    border: 1px solid #b8b8b8;
    border-top: none;
    border-radius: 0 0 6px 6px;
    padding: 0;
  }

  /* --- Title row --- */
  .title-row {
    background: linear-gradient(to bottom, #f7f7f7, #ececec);
    border-bottom: 1px solid #d0d0d0;
    padding: 14px 18px;
  }
  .title-row h1 {
    font-size: 18px;
    color: #0066a2;
    margin: 0 0 2px;
    letter-spacing: 2px;
  }
  .title-row .subtitle {
    font-size: 11px;
    color: #999;
  }

  /* --- Content area --- */
  .content {
    padding: 18px;
  }

  /* --- Task box --- */
  .task-box {
    background: #f0f6fa;
    border: 1px solid #b3d1e6;
    border-left: 6px solid #0066a2;
    padding: 18px 20px;
    margin: 24px 0 20px;
    font-size: 13px;
    color: #1a3d5c;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .task-box .task-label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #0066a2;
    margin-bottom: 6px;
    font-weight: bold;
  }
  .task-box .task-desc {
    font-size: 16px;
    line-height: 1.4;
  }
  .task-box strong { color: #0066a2; }
  #rerollBtn {
    flex-shrink: 0;
    padding: 4px 12px;
    font-size: 11px;
    font-family: Verdana, sans-serif;
    cursor: pointer;
    background: #fff;
    color: #0066a2;
    border: 1px solid #0066a2;
    border-radius: 3px;
    white-space: nowrap;
  }
  #rerollBtn:hover { background: #e8f2f8; }

  /* --- Status --- */
  #status {
    font-size: 11px;
    color: #999;
    margin-bottom: 10px;
    min-height: 1.3em;
  }

  /* --- Button --- */
  #startBtn {
    display: inline-block;
    padding: 8px 24px;
    font-size: 12px;
    font-family: Verdana, sans-serif;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(to bottom, #0077b8, #005a8e);

  #startBtn:hover { background: linear-gradient(to bottom, #008ad1, #0066a2); }
  #startBtn:disabled { background: #aaa; border-color: #999; cursor: not-allowed; }

  /* --- Camera view --- */
  .camera-wrap {
    position: relative;
    margin: 16px 0;
    display: none;
    background: #000;
    border: 2px solid #b8b8b8;
    border-radius: 3px;
    overflow: hidden;
  }
  video, #snapshot {
    width: 100%;
    display: block;
  }
  #snapshot { display: none; }
  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #countdown {
    position: absolute;
    top: 50%; left: 50%;

  /* --- Result --- */

  }
  #result.fail {

  /* --- Footer bar --- */

  @media (max-width: 500px) {

<body>
<div class="forum-page">

  <!-- Forum header -->
  <div class="forum-header">
    <span class="breadcrumb">Forum &rsaquo; Verifizierung</span>
    <span class="user">👤 Gast</span>
  </div>

  <div class="forum-panel">
    <!-- Title -->
    <div class="title-row">
      <h1>🤹 CATCHA</h1>
      <span class="subtitle">Jonglier-Verifizierung per Kamera &bull; Beweise, dass du kein Roboter bist</span>
    </div>

    <div class="content">
      <!-- Task -->
      <div class="task-box">
        <span id="taskText"></span>
        <button id="rerollBtn">🔀 Andere Aufgabe</button>
      </div>

      <!-- Result -->
      <div id="result"></div>

      <div id="status"></div>
      <button id="startBtn">▶ Kamera starten</button>

      <!-- Camera -->
      <div class="camera-wrap" id="cameraWrap">
        <video id="video" autoplay playsinline muted></video>
        <img id="snapshot" alt="Snapshot">
        <canvas id="overlay"></canvas>
        <div id="countdown"></div>
      </div>
    </div>
  </div>

  <div class="forum-footer">
    CATCHA v1.0 (1. April 2026) &bull; Analyse vom Bild läuft lokal in deinem Browser &bull; Keine Daten werden hochgeladen
  </div>
</div>

<script>
const COCO_CLASSES = [
  "person","bicycle","car","motorcycle","airplane","bus","train","truck","boat",
  "traffic light","fire hydrant","stop sign","parking meter","bench","bird","cat",
  "dog","horse","sheep","cow","elephant","bear","zebra","giraffe","backpack",
  "umbrella","handbag","tie","suitcase","frisbee","skis","snowboard","sports ball",
  "kite","baseball bat","baseball glove","skateboard","surfboard","tennis racket",
  "bottle","wine glass","cup","fork","knife","spoon","bowl","banana","apple",
  "sandwich","orange","broccoli","carrot","hot dog","pizza","donut","cake","chair",
  "couch","potted plant","bed","dining table","toilet","tv","laptop","mouse",
  "remote","keyboard","cell phone","microwave","oven","toaster","sink",
  "refrigerator","book","clock","vase","scissors","teddy bear","hair drier","toothbrush"
];

const SPORTS_BALL_ID = 32;
const FRISBEE_ID = 29;
const CONF_THRESHOLD = 0.25;
const IOU_THRESHOLD = 0.5;
const MODEL_SIZE = 640;

// --- Tasks ---
const TASKS = [
  { classId: SPORTS_BALL_ID, count: 1, label: "Jonglierball",  plural: "Jonglierbälle" },
  { classId: SPORTS_BALL_ID, count: 2, label: "Jonglierbälle", plural: "Jonglierbälle" },
  { classId: SPORTS_BALL_ID, count: 3, label: "Jonglierbälle", plural: "Jonglierbälle" },
  { classId: FRISBEE_ID,     count: 1, label: "Jonglierring",  plural: "Jonglierringe" },
  { classId: FRISBEE_ID,     count: 2, label: "Jonglierringe", plural: "Jonglierringe" },
];

// Display name overrides for COCO classes
const DISPLAY_NAMES = {
  0: "Person", 1: "Fahrrad", 2: "Auto", 3: "Motorrad", 4: "Flugzeug",
  5: "Bus", 6: "Zug", 7: "Lkw", 8: "Boot", 9: "Ampel",
  10: "Hydrant", 11: "Stoppschild", 12: "Parkuhr", 13: "Bank", 14: "Vogel",
  15: "Katze", 16: "Hund", 17: "Pferd", 18: "Schaf", 19: "Kuh",
  20: "Elefant", 21: "Bär", 22: "Zebra", 23: "Giraffe", 24: "Rucksack",
  25: "Regenschirm", 26: "Handtasche", 27: "Krawatte", 28: "Koffer", 29: "Jonglierring",
  30: "Skier", 31: "Snowboard", 32: "Jonglierball", 33: "Drachen", 34: "Baseballschläger",
  35: "Baseballhandschuh", 36: "Skateboard", 37: "Surfbrett", 38: "Tennisschläger",
  39: "Flasche", 40: "Weinglas", 41: "Tasse", 42: "Gabel", 43: "Messer",
  44: "Löffel", 45: "Schüssel", 46: "Banane", 47: "Apfel", 48: "Sandwich",
  49: "Orange", 50: "Brokkoli", 51: "Karotte", 52: "Hotdog", 53: "Pizza",
  54: "Donut", 55: "Kuchen", 56: "Stuhl", 57: "Sofa", 58: "Topfpflanze",
  59: "Bett", 60: "Esstisch", 61: "Toilette", 62: "Fernseher", 63: "Laptop",
  64: "Maus", 65: "Fernbedienung", 66: "Tastatur", 67: "Handy", 68: "Mikrowelle",
  69: "Backofen", 70: "Toaster", 71: "Spüle", 72: "Kühlschrank", 73: "Buch",
  74: "Uhr", 75: "Vase", 76: "Schere", 77: "Teddybär", 78: "Föhn", 79: "Zahnbürste"
};

let currentTask = null;

function pickTask(excludeCurrent) {
  let pool = TASKS;
  if (excludeCurrent && TASKS.length > 1) {
    pool = TASKS.filter(t => t !== currentTask);
  }
  currentTask = pool[Math.floor(Math.random() * pool.length)];
  renderTask();
}

function renderTask() {
  const numWord = ["", "EINEN", "ZWEI", "DREI"][currentTask.count];
  document.getElementById("taskText").innerHTML =
    `<span class="task-label">📋 Aufgabe</span><span class="task-desc">Halte <strong>${numWord}</strong> ${currentTask.label} in die Kamera.</span>`;
}

function displayName(classId) {
  return DISPLAY_NAMES[classId] || COCO_CLASSES[classId];
}

let session = null;

const statusEl    = document.getElementById("status");
const startBtn    = document.getElementById("startBtn");
const cameraWrap  = document.getElementById("cameraWrap");
const videoEl     = document.getElementById("video");
const snapshotEl  = document.getElementById("snapshot");
const overlayEl   = document.getElementById("overlay");
const countdownEl = document.getElementById("countdown");
const resultEl    = document.getElementById("result");

// Hidden canvas used only for frame capture & preprocessing
const captureCanvas = document.createElement("canvas");
const captureCtx = captureCanvas.getContext("2d");

// Pick initial task & wire reroll
pickTask(false);
document.getElementById("rerollBtn").addEventListener("click", () => pickTask(true));

// --- Load model ---
async function loadModel() {
  statusEl.textContent = "⏳ Modell wird geladen…";
  startBtn.disabled = true;
  try {
    ort.env.wasm.wasmPaths = "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/";
    const opts = { executionProviders: ["wasm"] };
    session = await ort.InferenceSession.create("model/yolov8n.onnx", opts);
    statusEl.textContent = "";
    startBtn.disabled = false;
  } catch (e) {
    statusEl.textContent = "❌ Modell konnte nicht geladen werden: " + (e.message || e);
    console.error("Model load error:", e);
  }
}
loadModel();

// --- Main flow ---
startBtn.addEventListener("click", async () => {
  resultEl.className = "";
  resultEl.style.display = "none";
  resultEl.textContent = "";
  startBtn.disabled = true;

  // Reset: show video, hide snapshot
  videoEl.style.display = "block";
  snapshotEl.style.display = "none";
  const overlayCtx = overlayEl.getContext("2d");
  overlayCtx.clearRect(0, 0, overlayEl.width, overlayEl.height);

  // 1. Webcam
  let stream;
  try {
    statusEl.textContent = "📷 Kamera wird angefragt…";
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } }
    });
  } catch (e) {
    statusEl.textContent = "❌ Kein Zugriff auf die Kamera.";
    startBtn.disabled = false;
    return;
  }

  videoEl.srcObject = stream;
  cameraWrap.style.display = "block";
  await new Promise(r => { videoEl.onloadedmetadata = r; });
  await videoEl.play();

  // 2. Countdown
  statusEl.textContent = "";
  for (let i = 3; i >= 1; i--) {
    countdownEl.style.display = "block";
    countdownEl.textContent = i;
    await sleep(1000);
  }
  countdownEl.textContent = "📸";
  await sleep(400);
  countdownEl.style.display = "none";

  // 3. Capture frame to hidden canvas, then show as <img>
  const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
  captureCanvas.width = vw;
  captureCanvas.height = vh;
  captureCtx.drawImage(videoEl, 0, 0, vw, vh);

  // Stop camera
  stream.getTracks().forEach(t => t.stop());

  // Convert to data URL and show as <img>
  snapshotEl.src = captureCanvas.toDataURL("image/jpeg");
  await new Promise(r => { snapshotEl.onload = r; });
  videoEl.style.display = "none";
  snapshotEl.style.display = "block";

  // Size overlay to match video resolution
  overlayEl.width = vw;
  overlayEl.height = vh;

  // 4. Preprocess from hidden canvas & run
  statusEl.textContent = "🔍 Erkennung läuft…";
  const inputTensor = preprocessFrame(captureCanvas);

  try {
    const results = await session.run({ images: inputTensor });
    const output = results[Object.keys(results)[0]];
    const detections = postprocess(output, vw, vh);

    // 5. Draw boxes on overlay
    const overlayCtx = overlayEl.getContext("2d");
    overlayCtx.clearRect(0, 0, vw, vh);
    console.log(`[CATCHA] Overlay canvas size: ${overlayEl.width}x${overlayEl.height}, CSS size: ${overlayEl.offsetWidth}x${overlayEl.offsetHeight}`);
    console.log(`[CATCHA] Detections: ${detections.length}`, detections);
    drawDetections(overlayCtx, detections);

    // 6. Result
    const targetId = currentTask.classId;
    const needed = currentTask.count;
    const matches = detections.filter(d => d.classId === targetId);
    statusEl.textContent = "";
    if (matches.length >= needed) {
      resultEl.className = "success";
      resultEl.textContent = `✅ Verifizierung bestanden! ${matches.length} ${matches.length === 1 ? currentTask.label : currentTask.plural} erkannt.`;
    } else {
      resultEl.className = "fail";
      const others = detections.filter(d => d.classId !== targetId);
      let msg = `❌ Nur ${matches.length} von ${needed} ${currentTask.plural} erkannt.`;
      if (others.length > 0) {
        const seen = others.map(d => `${displayName(d.classId)} (${(d.score*100).toFixed(0)}%)`);
        msg += `\nIch habe stattdessen gesehen: ${seen.join(", ")}`;
      } else if (matches.length === 0) {
        msg += `\nIch habe gar nichts erkannt.`;
      }
      msg += `\n\n💡 Tipp: Halte die Objekte näher an die Kamera und achte auf gute Beleuchtung.`;
      resultEl.textContent = msg;
    }
    resultEl.style.display = "block";
  } catch (e) {
    statusEl.textContent = "❌ Erkennung fehlgeschlagen: " + (e.message || e);
    console.error("Inference error:", e);
  }

  startBtn.disabled = false;
  startBtn.textContent = "🔄 Nochmal versuchen";
});

// --- Preprocessing ---
function preprocessFrame(sourceCanvas) {
  const canvas = document.createElement("canvas");
  canvas.width = MODEL_SIZE;
  canvas.height = MODEL_SIZE;
  const ctx = canvas.getContext("2d");

  const vw = sourceCanvas.width, vh = sourceCanvas.height;
  const scale = Math.min(MODEL_SIZE / vw, MODEL_SIZE / vh);
  const nw = Math.round(vw * scale), nh = Math.round(vh * scale);
  const dx = (MODEL_SIZE - nw) / 2, dy = (MODEL_SIZE - nh) / 2;

  ctx.fillStyle = "#808080";
  ctx.fillRect(0, 0, MODEL_SIZE, MODEL_SIZE);
  ctx.drawImage(sourceCanvas, dx, dy, nw, nh);

  const pixels = ctx.getImageData(0, 0, MODEL_SIZE, MODEL_SIZE).data;
  const float32 = new Float32Array(3 * MODEL_SIZE * MODEL_SIZE);
  const area = MODEL_SIZE * MODEL_SIZE;
  for (let i = 0; i < area; i++) {
    float32[i]            = pixels[i * 4]     / 255.0;
    float32[i + area]     = pixels[i * 4 + 1] / 255.0;
    float32[i + area * 2] = pixels[i * 4 + 2] / 255.0;
  }
  return new ort.Tensor("float32", float32, [1, 3, MODEL_SIZE, MODEL_SIZE]);
}

// --- Postprocessing ---
function postprocess(outputTensor, origW, origH) {
  const data = outputTensor.data;
  const dims = outputTensor.dims;
  const numClasses = 80;
  const numDet = dims[2]; // 8400

  console.log(`[CATCHA] Output tensor dims: [${dims}], total elements: ${data.length}`);
  console.log(`[CATCHA] Sample row0[0..3]:`, data[0], data[1], data[2], data[3]);

  // Check if coordinates are normalized (0-1) or pixel (0-640)
  // Sample a few cx values from row 0
  let maxCx = 0;
  for (let i = 0; i < Math.min(100, numDet); i++) {
    if (data[i] > maxCx) maxCx = data[i];
  }
  const isNormalized = maxCx <= 1.1;
  console.log(`[CATCHA] maxCx sample=${maxCx.toFixed(4)}, isNormalized=${isNormalized}`);

  const scale = Math.min(MODEL_SIZE / origW, MODEL_SIZE / origH);
  const dx = (MODEL_SIZE - origW * scale) / 2;
  const dy = (MODEL_SIZE - origH * scale) / 2;
  const raw = [];

  // Standard [1, 84, 8400] layout: data[row * numDet + col]
  for (let i = 0; i < numDet; i++) {
    let cx = data[0 * numDet + i];
    let cy = data[1 * numDet + i];
    let w  = data[2 * numDet + i];
    let h  = data[3 * numDet + i];

    // If normalized, scale to model input size
    if (isNormalized) {
      cx *= MODEL_SIZE;
      cy *= MODEL_SIZE;
      w  *= MODEL_SIZE;
      h  *= MODEL_SIZE;
    }

    let maxScore = 0, maxClass = 0;
    for (let c = 0; c < numClasses; c++) {
      const s = data[(4 + c) * numDet + i];
      if (s > maxScore) { maxScore = s; maxClass = c; }
    }
    if (maxScore < CONF_THRESHOLD) continue;

    // Convert from model coords (letterboxed) to original image coords
    const x1 = ((cx - w / 2) - dx) / scale;
    const y1 = ((cy - h / 2) - dy) / scale;
    const x2 = ((cx + w / 2) - dx) / scale;
    const y2 = ((cy + h / 2) - dy) / scale;

    raw.push({ x1, y1, x2, y2, score: maxScore, classId: maxClass });
  }

  console.log(`[CATCHA] Raw detections (pre-NMS): ${raw.length}`);
  if (raw.length > 0) console.log(`[CATCHA] Sample box:`, raw[0]);

  return nms(raw, IOU_THRESHOLD);
}

function nms(boxes, iouThresh) {
  const byClass = {};
  for (const b of boxes) (byClass[b.classId] ||= []).push(b);
  const kept = [];
  for (const cls in byClass) {
    const sorted = byClass[cls].sort((a, b) => b.score - a.score);
    const active = new Array(sorted.length).fill(true);
    for (let i = 0; i < sorted.length; i++) {
      if (!active[i]) continue;
      kept.push(sorted[i]);
      for (let j = i + 1; j < sorted.length; j++) {
        if (active[j] && iou(sorted[i], sorted[j]) > iouThresh) active[j] = false;
      }
    }
  }
  return kept;
}

function iou(a, b) {
  const x1 = Math.max(a.x1, b.x1), y1 = Math.max(a.y1, b.y1);
  const x2 = Math.min(a.x2, b.x2), y2 = Math.min(a.y2, b.y2);
  const inter = Math.max(0, x2 - x1) * Math.max(0, y2 - y1);
  return inter / ((a.x2-a.x1)*(a.y2-a.y1) + (b.x2-b.x1)*(b.y2-b.y1) - inter);
}

// --- Drawing ---
function drawDetections(ctx, detections) {
  ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
  console.log(`[CATCHA] drawDetections called, ${detections.length} items, canvas: ${ctx.canvas.width}x${ctx.canvas.height}`);
  for (const d of detections) {
    const isTarget = d.classId === currentTask.classId;
    const color = isTarget ? "#2a9d2a" : "#0066a2";
    const label = `${displayName(d.classId)} ${(d.score*100).toFixed(0)}%`;
    console.log(`[CATCHA] Drawing: ${label} at (${d.x1.toFixed(1)}, ${d.y1.toFixed(1)}) → (${d.x2.toFixed(1)}, ${d.y2.toFixed(1)}) color=${color}`);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.strokeRect(d.x1, d.y1, d.x2 - d.x1, d.y2 - d.y1);
    ctx.font = "bold 13px Verdana";
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = color;
    ctx.fillRect(d.x1, d.y1 - 18, tw + 8, 18);
    ctx.fillStyle = "#fff";
    ctx.fillText(label, d.x1 + 4, d.y1 - 4);
  }
}
